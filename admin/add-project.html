<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Add Project | Admin
</title>


<link rel="icon" href="../assets/logo.png">


<link rel="stylesheet" href="../style.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>


<body class="admin-body">



<!-- ADMIN HEADER -->


<header class="admin-header">


<div class="container">


<a href="dashboard.html"
class="admin-logo">


<img src="../assets/logo.png">

<span>
Ahmed Hamid Architecture
</span>


</a>



<a href="dashboard.html">

<i class="fa-solid fa-arrow-left"></i>

Dashboard

</a>



</div>


</header>









<!-- ADD PROJECT -->

<section class="admin-section">


<div class="container">



<div class="admin-box">



<h1>

Add New Project

</h1>



<p>

Upload project information and images.

</p>






<form id="project-form">





<div class="form-group">


<label>
Project Title
</label>


<input
type="text"
id="project-title"
placeholder="Example: Modern Villa Design"
required>


</div>







<div class="form-group">


<label>
Category
</label>


<select id="project-category"
required>


<option value="">
Select Category
</option>


<option value="residential">
Residential
</option>


<option value="commercial">
Commercial
</option>


<option value="interior">
Interior
</option>


<option value="planning">
Planning
</option>


</select>


</div>








<div class="form-group">


<label>
Location
</label>


<input
type="text"
id="project-location"
placeholder="Khartoum, Sudan">


</div>









<div class="form-group">


<label>
Plot Area
</label>


<input
type="text"
id="project-area"
placeholder="500 m²">


</div>









<div class="form-group">


<label>
Project Components
</label>


<textarea
id="project-components"
placeholder="Bedrooms, living spaces, services...">

</textarea>


</div>









<div class="form-group">


<label>
Design Concept
</label>


<textarea
id="project-description"
placeholder="Describe the design idea..."
required>

</textarea>


</div>








<div class="form-group">


<label>
Challenges
</label>


<textarea
id="project-challenges">

</textarea>


</div>









<div class="form-group">


<label>
Result
</label>


<textarea
id="project-result">

</textarea>


</div>









<div class="form-group">


<label>
Project Images
</label>


<input
type="file"
id="project-images"
multiple
accept="image/*"
required>


</div>









<button
type="submit"
class="btn btn-primary">


Publish Project


</button>





<p id="project-message"></p>






</form>





</div>


</div>


</section>









<script src="../script.js"></script>


</body>

</html>
