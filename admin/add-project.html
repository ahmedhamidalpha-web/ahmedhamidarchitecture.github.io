<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Project | Admin</title>
    <link rel="icon" href="../assets/logo.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="admin-body">

    <!-- ADMIN HEADER -->
    <header class="admin-header">
        <div class="container">
            <a href="dashboard.html" class="admin-logo">
                <img src="../assets/logo.png" alt="Logo">
                <span>Ahmed Hamid Architecture</span>
            </a>
            <a href="dashboard.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
        </div>
    </header>

    <!-- ADD PROJECT -->
    <section class="admin-section">
        <div class="container">
            <div class="admin-box">
                <h1>Add New Project</h1>
                <p>Upload project information and images.</p>

                <form id="project-form">
                    <div class="form-group">
                        <label for="project-title">Project Title</label>
                        <input type="text" id="project-title" placeholder="Example: Modern Villa Design" required>
                    </div>

                    <div class="form-group">
                        <label for="project-category">Category</label>
                        <select id="project-category" required>
                            <option value="">Select Category</option>
                            <option value="residential">Residential</option>
                            <option value="commercial">Commercial</option>
                            <option value="interior">Interior</option>
                            <option value="planning">Planning</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="project-location">Location</label>
                        <input type="text" id="project-location" placeholder="Khartoum, Sudan">
                    </div>

                    <div class="form-group">
                        <label for="project-area">Plot Area</label>
                        <input type="text" id="project-area" placeholder="500 m²">
                    </div>

                    <div class="form-group">
                        <label for="project-components">Project Components</label>
                        <textarea id="project-components" placeholder="Bedrooms, living spaces, services..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="project-description">Design Concept</label>
                        <textarea id="project-description" placeholder="Describe the design idea..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="project-challenges">Challenges</label>
                        <textarea id="project-challenges" placeholder="Identify architectural or structural challenges..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="project-result">Result</label>
                        <textarea id="project-result" placeholder="Outcome of the design process..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="project-images">Project Images</label>
                        <input type="file" id="project-images" multiple accept="image/*" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Publish Project</button>
                    <p id="project-message"></p>
                </form>
            </div>
        </div>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // 1. جدار الحماية: منع غير المسؤولين من الدخول
            if (localStorage.getItem("admin") !== "true") {
                window.location.href = "login.html";
                return;
            }

            const projectForm = document.getElementById("project-form");
            const messageElement = document.getElementById("project-message");

            // 2. دالة مساعدة لتحويل الصور المرفوعة إلى صيغة Base64 لحفظها محلياً
            function convertImageToBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                    reader.readAsDataURL(file);
                });
            }

            // 3. معالجة إرسال النموذج وحفظ البيانات
            projectForm.addEventListener("submit", async function (e) {
                e.preventDefault();
                messageElement.className = "";
                messageElement.textContent = "Processing and saving project...";

                try {
                    // تجميع ملفات الصور المرفوعة وتحويلها
                    const imageInput = document.getElementById("project-images");
                    const imageFiles = Array.from(imageInput.files);
                    const base64ImagesPromises = imageFiles.map(file => convertImageToBase64(file));
                    const base64Images = await Promise.all(base64ImagesPromises);

                    // بناء كائن المشروع الجديد
                    const newProject = {
                        id: "project_" + Date.now(), // رقم فريد باستخدام التوقيت الحالي
                        title: document.getElementById("project-title").value.trim(),
                        category: document.getElementById("project-category").value,
                        location: document.getElementById("project-location").value.trim() || "N/A",
                        area: document.getElementById("project-area").value.trim() || "N/A",
                        components: document.getElementById("project-components").value.trim(),
                        description: document.getElementById("project-description").value.trim(),
                        challenges: document.getElementById("project-challenges").value.trim(),
                        result: document.getElementById("project-result").value.trim(),
                        images: base64Images, // مصفوفة من الصور بصيغة Base64
                        createdAt: new Date().toISOString()
                    };

                    // استدعاء المشاريع المخزنة مسبقاً أو إنشاء مصفوفة جديدة
                    const existingProjects = JSON.parse(localStorage.getItem("architect_projects")) || [];
                    
                    // إضافة المشروع الجديد للمصفوفة
                    existingProjects.push(newProject);

                    // حفظ المصفوفة المحدثة في الـ LocalStorage
                    localStorage.setItem("architect_projects", JSON.stringify(existingProjects));

                    // رسالة نجاح وإعادة تعيين الحقول
                    messageElement.textContent = "Project published successfully!";
                    messageElement.className = "success"; // كلاس للتنسيق بالأخضر
                    projectForm.reset();

                    // العودة إلى لوحة التحكم بعد نجاح الإضافة بـ 1.5 ثانية
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1500);

                } catch (error) {
                    console.error("Error saving project:", error);
                    messageElement.textContent = "An error occurred while saving the project. Please try again.";
                    messageElement.className = "error"; // كلاس للتنسيق بالأحمر
                }
            });
        });
    </script>
</body>
</html>
