<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Project | Admin</title>
    <link rel="icon" href="../assets/logo.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="admin-body">

    <header class="admin-header">
        <div class="container">
            <a href="dashboard.html" class="admin-logo">
                <img src="../assets/logo.png" alt="Logo">
                <span>Ahmed Hamid Architecture</span>
            </a>
            <a href="dashboard.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Dashboard
            </a>
        </div>
    </header>

    <section class="admin-section">
        <div class="container">

            <div class="admin-box" id="projects-list-section" style="margin-bottom: 30px;">
                <h2>Select a Project to Edit</h2>
                <p>Click "Edit" on any project below to load its details into the form, or "Delete" to remove it.</p>
                
                <div class="table-responsive" style="overflow-x: auto; margin-top: 15px;">
                    <table class="admin-table" style="width:100%; border-collapse: collapse; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid #ddd; background: #f4f4f4;">
                                <th style="padding: 12px;">Project Title</th>
                                <th style="padding: 12px;">Category</th>
                                <th style="padding: 12px;">Location</th>
                                <th style="padding: 12px; text-align: center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="projects-table-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="admin-box" id="edit-form-section" style="display: none;">
                <h1>Edit Project</h1>
                <p>Modify the details of your selected project below.</p>

                <form id="edit-project-form">
                    <input type="hidden" id="edit-project-id">

                    <div class="form-group">
                        <label for="edit-title">Project Title</label>
                        <input type="text" id="edit-title" required>
                    </div>

                    <div class="form-group">
                        <label for="edit-category">Category</label>
                        <select id="edit-category">
                            <option value="residential">Residential</option>
                            <option value="commercial">Commercial</option>
                            <option value="interior">Interior</option>
                            <option value="planning">Planning</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="edit-location">Location</label>
                        <input type="text" id="edit-location">
                    </div>

                    <div class="form-group">
                        <label for="edit-area">Plot Area</label>
                        <input type="text" id="edit-area">
                    </div>

                    <div class="form-group">
                        <label for="edit-components">Components</label>
                        <textarea id="edit-components"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="edit-description">Design Concept</label>
                        <textarea id="edit-description" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="edit-challenges">Challenges</label>
                        <textarea id="edit-challenges"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="edit-result">Result</label>
                        <textarea id="edit-result"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="edit-images">Add New Images (Optional)</label>
                        <input type="file" id="edit-images" multiple accept="image/*">
                    </div>

                    <div class="form-group">
                        <label>Current Images (Click trash icon to remove)</label>
                        <div id="current-images" class="admin-images" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
                            </div>
                    </div>

                    <div style="display: flex; gap: 15px; margin-top: 20px;">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <button type="button" id="cancel-edit" class="btn" style="background: #e0e0e0; color: #333;">Cancel</button>
                    </div>

                    <p id="edit-message"></p>
                </form>
            </div>

        </div>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // 1. جدار الحماية: التحقق من تسجيل الدخول
            if (localStorage.getItem("admin") !== "true") {
                window.location.href = "login.html";
                return;
            }

            let projects = JSON.parse(localStorage.getItem("architect_projects")) || [];
            let activeProjectImages = []; // لتتبع وإدارة صور المشروع قيد التعديل الحالي

            const tableBody = document.getElementById("projects-table-body");
            const editFormSection = document.getElementById("edit-form-section");
            const projectsListSection = document.getElementById("projects-list-section");
            const cancelBtn = document.getElementById("cancel-edit");

            // 2. دالة بناء جدول عرض المشاريع
            function renderProjectsTable() {
                tableBody.innerHTML = "";
                
                if (projects.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding:20px; color:#888;">No projects found. Try adding some first!</td></tr>`;
                    return;
                }

                projects.forEach(project => {
                    const row = document.createElement("tr");
                    row.style.borderBottom = "1px solid #eee";
                    row.innerHTML = `
                        <td style="padding: 12px; font-weight: 500;">${project.title}</td>
                        <td style="padding: 12px; text-transform: capitalize;">${project.category}</td>
                        <td style="padding: 12px;">${project.location || 'N/A'}</td>
                        <td style="padding: 12px; text-align: center;">
                            <button class="btn-edit" data-id="${project.id}" style="background:#B98F2C; color:#white; border:none; padding: 6px 12px; border-radius: 4px; cursor:pointer; margin-right:5px;">
                                <i class="fa-solid fa-pen-to-square"></i> Edit
                            </button>
                            <button class="btn-delete" data-id="${project.id}" style="background:#e71d36; color:white; border:none; padding: 6px 12px; border-radius: 4px; cursor:pointer;">
                                <i class="fa-solid fa-trash"></i> Delete
                            </button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });

                // ربط أحداث الأزرار ديناميكياً
                attachTableEventListeners();
            }

            // 3. دالة ربط الأزرار (تعديل وحذف)
            function attachTableEventListeners() {
                // زر التعديل
                document.querySelectorAll(".btn-edit").forEach(button => {
                    button.addEventListener("click", function() {
                        const id = this.getAttribute("data-id");
                        loadProjectToForm(id);
                    });
                });

                // زر الحذف
                document.querySelectorAll(".btn-delete").forEach(button => {
                    button.addEventListener("click", function() {
                        const id = this.getAttribute("data-id");
                        if (confirm("Are you sure you want to delete this project permanently?")) {
                            projects = projects.filter(p => p.id !== id);
                            localStorage.setItem("architect_projects", JSON.stringify(projects));
                            renderProjectsTable();
                        }
                    });
                });
            }

            // 4. دالة تعبئة النموذج ببيانات المشروع المختار
            function loadProjectToForm(id) {
                const project = projects.find(p => p.id === id);
                if (!project) return;

                document.getElementById("edit-project-id").value = project.id;
                document.getElementById("edit-title").value = project.title;
                document.getElementById("edit-category").value = project.category;
                document.getElementById("edit-location").value = project.location || "";
                document.getElementById("edit-area").value = project.area || "";
                document.getElementById("edit-components").value = project.components || "";
                document.getElementById("edit-description").value = project.description || "";
                document.getElementById("edit-challenges").value = project.challenges || "";
                document.getElementById("edit-result").value = project.result || "";
                
                // نسخ مصفوفة صور المشروع لإدارتها
                activeProjectImages = project.images ? [...project.images] : [];
                renderCurrentImages();

                // إظهار نموذج التعديل وإخفاء جدول الاختيار لتوجيه التركيز
                editFormSection.style.display = "block";
                editFormSection.scrollIntoView({ behavior: 'smooth' });
            }

            // 5. دالة لعرض صور المشروع الحالية مع زر الحذف الفردي لكل صورة
            function renderCurrentImages() {
                const imagesContainer = document.getElementById("current-images");
                imagesContainer.innerHTML = "";

                if (activeProjectImages.length === 0) {
                    imagesContainer.innerHTML = "<p style='color:#888; font-size:13px;'>No images saved for this project.</p>";
                    return;
                }

                activeProjectImages.forEach((imgSrc, index) => {
                    const imgWrapper = document.createElement("div");
                    imgWrapper.style.position = "relative";
                    imgWrapper.style.width = "80px";
                    imgWrapper.style.height = "80px";
                    
                    imgWrapper.innerHTML = `
                        <img src="${imgSrc}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px; border: 1px solid #ddd;">
                        <button type="button" class="delete-img-btn" data-index="${index}" style="position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px;">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    `;
                    imagesContainer.appendChild(imgWrapper);
                });

                // ربط أحداث زر حذف الصور
                document.querySelectorAll(".delete-img-btn").forEach(btn => {
                    btn.addEventListener("click", function() {
                        const index = parseInt(this.getAttribute("data-index"));
                        activeProjectImages.splice(index, 1);
                        renderCurrentImages(); // إعادة بناء المعاينة بعد الحذف
                    });
                });
            }

            // إلغاء التعديل والعودة للجدول
            cancelBtn.addEventListener("click", function() {
                editFormSection.style.display = "none";
                document.getElementById("edit-project-form").reset();
                projectsListSection.scrollIntoView({ behavior: 'smooth' });
            });

            // 6. تحويل الصور الجديدة المرفوعة إلى Base64
            function convertImageToBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                    reader.readAsDataURL(file);
                });
            }

            // 7. معالجة وحفظ التعديلات على الـ LocalStorage
            const editForm = document.getElementById("edit-project-form");
            const messageElement = document.getElementById("edit-message");

            editForm.addEventListener("submit", async function (e) {
                e.preventDefault();
                messageElement.className = "";
                messageElement.textContent = "Saving updates...";

                const projectId = document.getElementById("edit-project-id").value;
                const projectIndex = projects.findIndex(p => p.id === projectId);

                if (projectIndex === -1) {
                    messageElement.textContent = "Project not found!";
                    messageElement.className = "error";
                    return;
                }

                try {
                    // معالجة وإضافة الصور الجديدة إن وجدت
                    const fileInput = document.getElementById("edit-images");
                    if (fileInput.files.length > 0) {
                        const newFiles = Array.from(fileInput.files);
                        const newBase64Promises = newFiles.map(file => convertImageToBase64(file));
                        const newBase64Images = await Promise.all(newBase64Promises);
                        activeProjectImages = [...activeProjectImages, ...newBase64Images];
                    }

                    // تحديث بيانات المشروع المستهدف في المصفوفة الأصلية
                    projects[projectIndex] = {
                        ...projects[projectIndex],
                        title: document.getElementById("edit-title").value.trim(),
                        category: document.getElementById("edit-category").value,
                        location: document.getElementById("edit-location").value.trim(),
                        area: document.getElementById("edit-area").value.trim(),
                        components: document.getElementById("edit-components").value.trim(),
                        description: document.getElementById("edit-description").value.trim(),
                        challenges: document.getElementById("edit-challenges").value.trim(),
                        result: document.getElementById("edit-result").value.trim(),
                        images: activeProjectImages, // تحديث قائمة الصور بما فيها المحذوف والمضاف
                        updatedAt: new Date().toISOString()
                    };

                    // تحديث التخزين المحلي
                    localStorage.setItem("architect_projects", JSON.stringify(projects));

                    messageElement.textContent = "Project updated successfully!";
                    messageElement.className = "success";

                    // إعادة البناء والتنظيف
                    setTimeout(() => {
                        editFormSection.style.display = "none";
                        editForm.reset();
                        renderProjectsTable();
                        projectsListSection.scrollIntoView({ behavior: 'smooth' });
                    }, 1200);

                } catch (err) {
                    console.error("Error updating project:", err);
                    messageElement.textContent = "Failed to update project. Try again.";
                    messageElement.className = "error";
                }
            });

            // التشغيل الأولي وبناء الجدول
            renderProjectsTable();
        });
    </script>
</body>
</html>
