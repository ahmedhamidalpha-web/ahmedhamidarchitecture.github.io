<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Hamid Architecture | المنصة الهندسية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- شريط الخانات العلوي (Navbar) -->
    <nav class="main-navbar">
        <div class="nav-container">
            <div class="logo-wrapper">
                <img src="assets/logo.png" alt="Ahmed Hamid Architecture" class="company-logo-img">
                <span class="company-name-text">Ahmed Hamid Architecture</span>
            </div>
            <ul class="nav-links">
                <li><a href="#posts-feed-container" class="active">المشاريع</a></li>
                <li><button id="adminLoginBtn" class="btn-nav-admin">لوحة التحكم ⚙️</button></li>
            </ul>
        </div>
    </nav>

    <!-- الهيدر الترحيبي (Hero Section) -->
    <header class="hero-header">
        <div class="header-content">
            <h1>المعرض الهندسي التفاعلي</h1>
            <p>توثيق الفكرة التصميمية، التحديات الإنتاجية، والحلول المعمارية للمشاريع</p>
        </div>
    </header>

    <!-- الحاوية الرئيسية للمحتوى -->
    <div class="container">
        
        <!-- لوحة التحكم (مخفية افتراضياً وتظهر عند الضغط على الزر العلوي) -->
        <section id="adminPanelSection" style="display: none;">
            <h3>📐 نشر وثيقة مشروع معماري جديد</h3>
            <form id="adminPublishForm">
                <div class="form-group">
                    <label>📋 اسم المشروع المعماري:</label>
                    <input type="text" id="postTitle" class="form-control" placeholder="مثال: فيلا سكنية مودرن" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>📍 الموقع الجغرافي:</label>
                        <input type="text" id="postLocation" class="form-control" placeholder="الموقع">
                    </div>
                    <div class="form-group">
                        <label>📐 مساحة الأرض / المسطح:</label>
                        <input type="text" id="postArea" class="form-control" placeholder="مثال: 400 متر مربع">
                    </div>
                </div>

                <div class="form-group">
                    <label>🧱 مكونات وعناصر المشروع:</label>
                    <input type="text" id="postComponents" class="form-control" placeholder="طوابق، غرف...">
                </div>
                
                <div class="form-group">
                    <label>💡 الفكرة التصميمية (Concept):</label>
                    <textarea id="postConcept" class="form-control" placeholder="شرح لكتل المشروع والتوجه المعماري..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>⚠️ التحديات المعمارية والإنشائية:</label>
                    <textarea id="postChallenges" class="form-control" placeholder="التحديات وكيف تم حلها..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>🏆 النتيجة المرفقة والحل:</label>
                    <textarea id="postResult" class="form-control" placeholder="وصف المخرج النهائي للمشروع..."></textarea>
                </div>
                
                <div class="form-group">
                    <label>📸 إرفاق الصور والمخططات المباشرة:</label>
                    <input type="file" id="postFiles" class="form-control" multiple accept="image/*" style="padding: 8px;">
                </div>
                
                <div class="form-buttons">
                    <button type="submit" class="btn-primary">نشر المشروع الآن 🚀</button>
                    <button type="button" class="btn-logout">خروج 🚪</button>
                </div>
            </form>
        </section>

        <!-- قسم التغذية البصرية وعرض المشاريع -->
        <main id="posts-feed-container">
            <!-- الكروت ستظهر هنا عبر السكريبت -->
        </main>
    </div>

    <!-- الفوتر الأزرق في أسفل الموقع -->
    <footer class="main-footer">
        <div class="footer-content">
            <img src="assets/logo.png" alt="Ahmed Hamid Architecture" class="footer-logo-img">
            <p>© 2026 All Rights Reserved | Ahmed Hamid Architecture</p>
            <span class="footer-sub">جودة إنشائية وفلسفة تصميمية مبتكرة</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
