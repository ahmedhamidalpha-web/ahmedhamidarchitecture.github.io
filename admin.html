<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل دخول الادمن</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <img src="assets/logo.png" class="footer-logo-img">
        <h2>لوحة تحكم المدير</h2>
        <div id="loginFormSection" class="login-form">
            <input type="text" id="loginUsername" placeholder="اسم المستخدم" required>
            <input type="password" id="loginPassword" placeholder="كلمة السر" required>
            <button id="submitLoginBtn" class="btn-primary">دخول</button>
            <p id="loginError" style="color:red;"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
