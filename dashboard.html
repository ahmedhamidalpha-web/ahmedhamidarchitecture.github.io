<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="main-navbar">
        <div class="nav-container">
            <span>مرحبا Ahmed</span>
            <button id="logoutBtn" class="btn-outline" style="color:var(--primary); border-color:var(--primary);">تسجيل خروج</button>
        </div>
    </nav>

    <main class="container">
        <h1>لوحة التحكم</h1>

        <section class="admin-card">
            <h3>اضافة مشروع جديد</h3>
            <form id="addProjectForm">
                <input type="text" id="pTitle" placeholder="عنوان المشروع" required>
                <input type="text" id="pLocation" placeholder="الموقع">
                <input type="text" id="pArea" placeholder="المساحة">
                <textarea id="pConcept" placeholder="فكرة المشروع" rows="3"></textarea>
                <textarea id="pImages" placeholder="روابط الصور مفصولة بفاصلة,"></textarea>
                <button type="submit" class="btn-primary">نشر المشروع</button>
            </form>
        </section>

        <section class="admin-card">
            <h3>اضافة وظيفة جديدة</h3>
            <form id="addJobForm">
                <input type="text" id="jTitle" placeholder="المسمى الوظيفي" required>
                <input type="text" id="jLocation" placeholder="الموقع">
                <textarea id="jDesc" placeholder="الوصف والمتطلبات" rows="3"></textarea>
                <button type="submit" class="btn-primary">نشر الوظيفة</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
                  </html>
